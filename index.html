<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>NICA CREATOR</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
/* ===== FONDO GENERAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #020617; /* Azul muy oscuro */
    color: white;
    overflow-x: hidden;
}

/* ===== MENÚ MEJORADO ===== */
header {
    background: #0f172a;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1e293b;
}

header div {
    font-weight: bold;
    letter-spacing: 1px;
    color: #3b82f6;
}

nav a {
    color: #94a3b8;
    margin-left: 15px;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s;
}

nav a:hover {
    color: #3b82f6;
}

/* ===== CONTENIDO ===== */
section {
    padding: 40px 20px;
    text-align: center;
}

h1 { color: #3b82f6; }

/* ===== CHAT WIDGET ===== */
#chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
}

/* BOTÓN FLOTANTE */
#chat-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #2563eb;
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* VENTANA DE CHAT */
#chat-window {
    display: none;
    width: 350px;
    height: 500px;
    background: #1e293b; /* Fondo azul oscuro en lugar de blanco/negro */
    position: absolute;
    bottom: 75px;
    right: 0;
    border-radius: 15px;
    overflow: hidden;
    flex-direction: column;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border: 1px solid #334155;
}

/* HEADER DEL CHAT */
.chat-header {
    background: #2563eb;
    color: white;
    padding: 15px;
    font-weight: bold;
    text-align: center;
    font-size: 14px;
}

/* CUERPO DEL CHAT */
#chat-body {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #0f172a; /* Azul más profundo para los mensajes */
}

/* MENSAJES */
.msg {
    padding: 10px 14px;
    border-radius: 15px;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.4;
}

.user {
    background: #2563eb;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
}

.bot {
    background: #334155;
    color: #e2e8f0;
    align-self: flex-start;
    border-bottom-left-radius: 2px;
}

/* ÁREA DE INPUT */
.chat-input {
    display: flex;
    padding: 12px;
    background: #1e293b; /* Azul para el contenedor del input */
    gap: 8px;
}

.chat-input input {
    flex: 1;
    padding: 10px 15px;
    border-radius: 25px;
    border: 1px solid #334155;
    outline: none;
    background: #0f172a; /* Input azul muy oscuro */
    color: white;
}

.chat-input button {
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    flex-shrink: 0;
}

/* ===== OPTIMIZACIÓN MÓVIL (CELULAR) ===== */
@media (max-width: 600px) {
    header {
        flex-direction: column;
        gap: 10px;
    }
    
    nav a {
        margin: 0 8px;
    }

    #chat-window {
        width: 85vw; /* Casi todo el ancho del celular */
        height: 70vh; /* Altura cómoda para teclado móvil */
        right: -10px; /* Ajuste de posición */
        bottom: 70px;
    }
    
    #chat-btn {
        width: 55px;
        height: 55px;
    }
}
</style>

</head>

<body>

<header>
    <div>NICA CREATOR</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<section>
    <h1>Bienvenido</h1>
    <p>Soluciones tecnológicas desde Nicaragua.</p>
</section>

<section>
    <h2>Servicios</h2>
    <p>✔ Desarrollo en Go & PostgreSQL</p>
    <p>✔ Apps Móviles</p>
    <p>✔ Implementación ERP</p>
</section>

<div id="chat-widget">
    <button id="chat-btn" onclick="toggleChat()">💬</button>

    <div id="chat-window">
        
        <div class="chat-header">
            🔵 SOPORTE NICA CREATOR
        </div>

        <div id="chat-body">
            <div class="msg bot">¡Hola! ¿En qué puedo ayudarte hoy?</div>
        </div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje..." onkeypress="checkEnter(event)">
            <button onclick="send()">➤</button>
        </div>

    </div>
</div>

<script>
const API_URL = "https://agent-b-26n4.onrender.com/chat";

function toggleChat() {
    const chat = document.getElementById("chat-window");
    if (chat.style.display === "flex") {
        chat.style.display = "none";
    } else {
        chat.style.display = "flex";
        // Auto-focus en móviles al abrir
        setTimeout(() => document.getElementById("user-input").focus(), 300);
    }
}

function addMessage(type, text) {
    const body = document.getElementById("chat-body");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function send() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("user", text);
    input.value = "";

    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        dataType: "json",
        data: JSON.stringify({ message: text }),
        success: function(res) {
            addMessage("bot", res.reply);
        },
        error: function() {
            addMessage("bot", "No pude conectarme. Revisa tu conexión.");
        }
    });
}

function checkEnter(e) {
    if (e.key === "Enter") send();
}
</script>

</body>
</html>
