<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NICA CREATOR</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
/* ===== FONDO GENERAL ===== */
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

/* ===== MENÚ (EJEMPLO) ===== */
header {
    background: #0f172a;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    color: white;
}

nav a {
    color: #93c5fd;
    margin: 0 10px;
    text-decoration: none;
}

/* ===== CONTENIDO ===== */
section {
    padding: 40px;
    text-align: center;
}

/* ===== CHAT ===== */
#chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
}

/* BOTÓN */
#chat-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #2563eb;
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* VENTANA */
#chat-window {
    display: none;
    width: 360px;
    height: 520px;
    background: #0b1220;
    position: absolute;
    bottom: 80px;
    right: 0;
    border-radius: 18px;
    overflow: hidden;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* HEADER CHAT */
.chat-header {
    background: #2563eb;
    color: white;
    padding: 12px;
    font-weight: bold;
    text-align: center;
}

/* MENSAJES */
#chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* MENSAJES */
.msg {
    padding: 10px 12px;
    border-radius: 15px;
    max-width: 75%;
    font-size: 14px;
}

/* USUARIO */
.user {
    background: #3b82f6;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
}

/* BOT */
.bot {
    background: #1e293b;
    color: #cbd5f5;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
}

/* INPUT */
.chat-input {
    display: flex;
    padding: 8px;
    background: #020617;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

.chat-input button {
    margin-left: 8px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    #chat-window {
        width: 95%;
        height: 70vh;
        right: 2.5%;
    }

    #chat-btn {
        width: 55px;
        height: 55px;
        font-size: 22px;
    }
}
</style>

</head>

<body>

<!-- ===== MENÚ ===== -->
<header>
    <div>NICA CREATOR</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<!-- ===== CONTENIDO ===== -->
<section>
    <h1>Bienvenido</h1>
    <p>Tu sistema con chat integrado</p>
</section>

<section>
    <h2>Servicios</h2>
    <p>✔ Sistemas en Go</p>
    <p>✔ Chatbots</p>
    <p>✔ Desarrollo Web</p>
</section>

<!-- ===== CHAT ===== -->
<div id="chat-widget">
    <button id="chat-btn" onclick="toggleChat()">💬</button>

    <div id="chat-window">
        
        <div class="chat-header">
            🤖 NICA CHAT
        </div>

        <div id="chat-body"></div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe..." onkeypress="checkEnter(event)">
            <button onclick="send()">➤</button>
        </div>

    </div>
</div>

<!-- ===== SCRIPT ===== -->
<script>

const API_URL = "https://agent-b-26n4.onrender.com/chat";

function toggleChat() {
    const chat = document.getElementById("chat-window");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

function addMessage(type, text) {
    const body = document.getElementById("chat-body");

    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;

    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function send() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("user", text);
    input.value = "";

    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        dataType: "json",
        data: JSON.stringify({ message: text }),

        success: function(res) {
            addMessage("bot", res.reply);
        },

        error: function() {
            addMessage("bot", "Error conectando con el servidor.");
        }
    });
}

function checkEnter(e) {
    if (e.key === "Enter") send();
}

</script>

</body>
</html>
