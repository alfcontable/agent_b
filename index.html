<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICA-CREATOR | Expertos en Odoo y Chatbots</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --ed-blue: #0076f6;
            --ed-dark: #0d1117;
            --ed-black: #010409;
            --whatsapp-green: #25d366;
            --text-light: #f0f6fc;
            --text-gray: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--ed-black);
            color: var(--text-light);
            scroll-behavior: smooth;
        }

        .navbar {
            background-color: rgba(13, 17, 23, 0.95);
            border-bottom: 1px solid #30363d;
            backdrop-filter: blur(10px);
            padding: 0.8rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--ed-blue) !important;
            font-size: 1.5rem;
        }

        .nav-link {
            color: var(--text-gray) !important;
            font-weight: 500;
            margin: 0 15px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--ed-blue) !important;
        }

        .hero {
            padding: 120px 0;
            background: radial-gradient(circle at top right, #004494 0%, var(--ed-black) 50%);
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
        }

        .service-card {
            background: var(--ed-dark);
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px;
        }

        #chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
        }

        #whatsapp-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--whatsapp-green);
            color: white;
            border: none;
            font-size: 30px;
        }

        #chat-window {
            width: 380px;
            height: 550px;
            background: var(--ed-dark);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            position: absolute;
            bottom: 85px;
            right: 0;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .msg {
            max-width: 85%;
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 10px;
        }

        .bot-msg {
            background: #30363d;
        }

        .user-msg {
            background: var(--ed-blue);
            align-self: flex-end;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">NICA-CREATOR</a>
    </div>
</nav>

<section class="hero">
    <h1>Chatbot inteligente</h1>
</section>

<!-- CHAT -->
<div id="chat-widget">
    <div id="chat-window">
        <div class="chat-body" id="chat-body"></div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe..." onkeypress="checkEnter(event)">
            <button onclick="handleSend()">➤</button>
        </div>
    </div>

    <button id="whatsapp-btn" onclick="toggleChat()">💬</button>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    const API_URL = "https://agent-b-26n4.onrender.com/chat";

    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
    }

    function addMessage(sender, text) {
        const body = document.getElementById('chat-body');
        const div = document.createElement('div');
        div.className = `msg ${sender === 'bot' ? 'bot-msg' : 'user-msg'}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
    }

    function handleSend() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage('user', text);
        input.value = '';

        // ✅ AJAX CORREGIDO
        $.ajax({
            url: API_URL,
            type: 'POST',
            contentType: 'application/json',
            dataType: 'json', // 🔥 CLAVE
            data: JSON.stringify({ message: text }),

            success: function(res) {
                addMessage('bot', res.reply);
            },

            error: function(xhr) {
                console.log(xhr.responseText);
                addMessage('bot', "Error conectando con el servidor.");
            }
        });
    }

    function checkEnter(e) {
        if (e.key === 'Enter') handleSend();
    }
</script>

</body>
</html>
