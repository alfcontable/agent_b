<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NICA-CREATOR</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0d1117;
    color: white;
}

/* BOTÓN CHAT */
#chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25d366;
    color: white;
    border: none;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 30px;
    cursor: pointer;
}

/* VENTANA CHAT */
#chat-window {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 380px;
    height: 550px;
    background: #161b22;
    border-radius: 15px;
    display: none;
    flex-direction: column;
    overflow: hidden;
}

/* MENSAJES */
#chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 10px;
    border-radius: 12px;
    margin: 5px 0;
    max-width: 80%;
}

.bot {
    background: #30363d;
    align-self: flex-start;
}

.user {
    background: #0076f6;
    align-self: flex-end;
}

/* INPUT */
#chat-input {
    display: flex;
    border-top: 1px solid #30363d;
}

#chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

#chat-input button {
    background: #0076f6;
    border: none;
    color: white;
    padding: 10px;
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

    #chat-window {
        width: 95%;
        height: 70vh;
        right: 2.5%;
        bottom: 80px;
    }

    #chat-btn {
        width: 55px;
        height: 55px;
        font-size: 24px;
    }

    .msg {
        font-size: 14px;
    }
}
</style>

</head>

<body>

<!-- BOTÓN -->
<button id="chat-btn" onclick="toggleChat()">💬</button>

<!-- CHAT -->
<div id="chat-window">
    <div id="chat-body"></div>

    <div id="chat-input">
        <input type="text" id="user-input" placeholder="Escribe..." onkeypress="checkEnter(event)">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
const API_URL = "https://agent-b-26n4.onrender.com/chat";

function toggleChat() {
    const chat = document.getElementById("chat-window");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

function addMessage(type, text) {
    const body = document.getElementById("chat-body");
    const div = document.createElement("div");

    div.className = "msg " + type;
    div.innerHTML = text.replace(/\n/g, "<br>");

    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function send() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    // 🔥 AJAX CORREGIDO
    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        dataType: "json",

        data: JSON.stringify({
            message: text
        }),

        success: function(res) {
            addMessage("bot", res.reply);
        },

        error: function(xhr) {
            console.log(xhr.responseText);
            addMessage("bot", "Error conectando con el servidor.");
        }
    });
}

function checkEnter(e) {
    if (e.key === "Enter") send();
}
</script>

</body>
</html>
