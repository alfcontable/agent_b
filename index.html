<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NICA CREATOR</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* ===== MENÚ ===== */
header {
    background: #111;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* ===== SECCIÓN SERVICIOS ===== */
.hero {
    text-align: center;
    padding: 50px;
}

/* ===== CHAT ===== */
#chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
}

/* BOTÓN */
#chat-btn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: #25d366;
    color: white;
    border: none;
    font-size: 30px;
    cursor: pointer;
}

/* VENTANA */
#chat-window {
    display: none;
    width: 360px;
    height: 520px;
    background: #161b22;
    position: absolute;
    bottom: 80px;
    right: 0;
    border-radius: 15px;
    flex-direction: column;
    overflow: hidden;
}

/* MENSAJES */
#chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #0076f6;
    color: white;
    align-self: flex-end;
}

.bot {
    background: #30363d;
    color: white;
    align-self: flex-start;
}

/* INPUT */
.chat-input {
    display: flex;
    border-top: 1px solid #30363d;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

.chat-input button {
    background: #0076f6;
    color: white;
    border: none;
    padding: 10px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    #chat-window {
        width: 95%;
        height: 70vh;
        right: 2.5%;
    }

    #chat-btn {
        width: 55px;
        height: 55px;
        font-size: 24px;
    }
}
</style>

</head>

<body>

<!-- ===== MENÚ ===== -->
<header>
    <div>NICA CREATOR</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<!-- ===== CONTENIDO ===== -->
<section class="hero">
    <h1>Bienvenido a mi sistema</h1>
    <p>Servicios de desarrollo y chat bot</p>
</section>

<section class="hero">
    <h2>Servicios</h2>
    <p>✔ Desarrollo Web</p>
    <p>✔ Chatbots</p>
    <p>✔ Sistemas en Go</p>
</section>

<!-- ===== CHAT FLOAT ===== -->
<div id="chat-widget">
    <button id="chat-btn" onclick="toggleChat()">💬</button>

    <div id="chat-window">
        <div id="chat-body"></div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe..." onkeypress="checkEnter(event)">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>

<!-- ===== JS ===== -->
<script>

const API_URL = "https://agent-b-26n4.onrender.com/chat";

function toggleChat() {
    const chat = document.getElementById("chat-window");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

function addMessage(type, text) {
    const body = document.getElementById("chat-body");

    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;

    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function send() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("user", text);
    input.value = "";

    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        dataType: "json",
        data: JSON.stringify({ message: text }),

        success: function(res) {
            addMessage("bot", res.reply);
        },

        error: function() {
            addMessage("bot", "Error conectando con el servidor.");
        }
    });
}

function checkEnter(e) {
    if (e.key === "Enter") send();
}

</script>

</body>
</html>
