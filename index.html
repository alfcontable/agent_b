<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NICA CREATOR</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
/* ===== ESTILO GENERAL ===== */
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #020617;
    color: white;
}

header {
    background: #0f172a;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1e293b;
}

header div { font-weight: bold; color: #3b82f6; }
nav a { color: #94a3b8; text-decoration: none; font-size: 13px; margin-left: 10px; }

/* ===== CHAT WIDGET ===== */
#chat-widget {
    position: fixed;
    bottom: 15px;
    right: 15px;
    z-index: 9999;
}

/* BOTÓN VERDE */
#chat-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: #22c55e; /* VERDE */
    color: white;
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* VENTANA DE CHAT MÓVIL OPTIMIZADA */
#chat-window {
    display: none;
    width: 320px;
    height: 450px;
    background: #1e293b;
    position: absolute;
    bottom: 65px;
    right: 0;
    border-radius: 12px;
    overflow: hidden;
    flex-direction: column;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    border: 1px solid #334155;
}

.chat-header {
    background: #0f172a;
    color: white;
    padding: 12px;
    font-weight: bold;
    text-align: center;
    font-size: 13px;
    border-bottom: 1px solid #334155;
}

/* CUERPO CON SCROLL FIJO */
#chat-body {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #0f172a;
}

.msg {
    padding: 8px 12px;
    border-radius: 12px;
    max-width: 85%;
    font-size: 13px;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
}

.bot {
    background: #334155;
    color: #cbd5e1;
    align-self: flex-start;
    border-bottom-left-radius: 2px;
}

/* INPUT PEQUEÑO Y COMPACTO */
.chat-input {
    display: flex;
    padding: 10px;
    background: #1e293b;
    gap: 6px;
    align-items: center;
}

.chat-input input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 18px;
    border: 1px solid #475569;
    outline: none;
    background: #0f172a;
    color: white;
    font-size: 14px; /* Evita zoom automático en iPhone */
}

.chat-input button {
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    cursor: pointer;
    flex-shrink: 0;
}

/* AJUSTES PARA CELULARES PEQUEÑOS */
@media (max-width: 480px) {
    #chat-window {
        width: 88vw;
        height: 60vh;
        right: -5px;
    }
}
</style>
</head>
<body>

<header>
    <div>NICA CREATOR</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Proyectos</a>
    </nav>
</header>

<section style="text-align: center; padding: 50px 20px;">
    <h1>CONTANOR</h1>
    <p>Sistema Contable & ERP</p>
</section>

<div id="chat-widget">
    <button id="chat-btn" onclick="toggleChat()">💬</button>

    <div id="chat-window">
        <div class="chat-header">🤖 ASISTENTE NICA CREATOR</div>
        <div id="chat-body">
            <div class="msg bot">Hola Rachel, ¿cómo va el desarrollo de CONTANOR?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe aquí..." onkeypress="checkEnter(event)">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
const API_URL = "https://agent-b-26n4.onrender.com/chat";

function toggleChat() {
    const chat = document.getElementById("chat-window");
    const isVisible = chat.style.display === "flex";
    chat.style.display = isVisible ? "none" : "flex";
    if (!isVisible) scrollToBottom();
}

function scrollToBottom() {
    const body = document.getElementById("chat-body");
    body.scrollTop = body.scrollHeight;
}

function addMessage(type, text) {
    const body = document.getElementById("chat-body");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text; // Usamos innerText por seguridad
    body.appendChild(div);
    scrollToBottom(); // Asegura que siempre veamos el último
}

function send() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("user", text);
    input.value = "";
    
    // Feedback visual de carga
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "msg bot";
    loadingDiv.innerText = "...";
    loadingDiv.id = "loading-msg";
    document.getElementById("chat-body").appendChild(loadingDiv);
    scrollToBottom();

    $.ajax({
        url: API_URL,
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({ message: text }),
        success: function(res) {
            $("#loading-msg").remove();
            addMessage("bot", res.reply || res.message || "Respuesta recibida");
        },
        error: function(xhr) {
            $("#loading-msg").remove();
            addMessage("bot", "Error: No se pudo conectar con Render. (Estado: " + xhr.status + ")");
            console.error("Detalle del error:", xhr);
        }
    });
}

function checkEnter(e) {
    if (e.key === "Enter") send();
}
</script>

</body>
</html>
